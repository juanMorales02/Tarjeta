<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Presentacion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
    <div class="card-white">
      <p class="card-logo">◈</p>
      <p class="card-name">MARIA MORALES</p>
      <p class="card-title">photographer</p>
    </div>
  </div>

     <div class="back-card">
    <div class="back-card-white">
        <div class="back-card-frame">
        <div class="info-row">
          <span class="icon">📍</span>
          <span>123 Street, City name</span>
        </div>
        <div class="info-row">
          <span>hello@surname.com</span>
        </div>
        <div class="info-row">
          <span>www.yourwebsite.com</span>
        </div>
        <div class="dots">· · · · · · · · · ·</div>
        <div class="follow">follow me!</div>
        <div class="info-row">
          <span class="icon">📷</span>
          <span>@surname.com</span>
        </div>
      </div>
    
    </div>
  </div>



</body>
</html>
